<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubuntu AI Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">
    <header class="hero">
      <p class="eyebrow">Cloud-ready learning dashboard</p>
      <h1>Ubuntu AI Tutor</h1>
      <p class="subtitle">A focused 14-day path to Linux fluency, server confidence, and practical AI operations.</p>
    </header>

    <main>
      <section class="week-section" aria-labelledby="week1-title">
        <button id="week1Toggle" class="week-toggle-btn week-1-label" type="button" aria-expanded="true" aria-controls="week1Grid">
          <span id="week1-title">Week 1 - Core foundations</span>
        </button>
        <div id="week1Grid" class="curriculum-grid"></div>
      </section>

      <section class="week-section" aria-labelledby="week2-title">
        <button id="week2Toggle" class="week-toggle-btn week-2-label" type="button" aria-expanded="true" aria-controls="week2Grid">
          <span id="week2-title">Week 2 - Server &amp; AI operations</span>
        </button>
        <div id="week2Grid" class="curriculum-grid"></div>
      </section>
    </main>
  </div>

  <div id="chatModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-panel">
      <div class="modal-head">
        <h3 id="modalTitle">Day Session</h3>
        <button id="closeModal" class="icon-btn" type="button" aria-label="Close chat">x</button>
      </div>

      <div id="chatHistory" class="chat-history" aria-live="polite"></div>

      <form id="chatForm" class="chat-input-row">
        <input id="chatInput" type="text" placeholder="Ask a question about today's topic..." autocomplete="off" required>
        <button class="send-btn" type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
